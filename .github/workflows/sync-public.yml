name: Sync to public repo

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v6
        with:
          # Only download the LATEST version (no history)
          fetch-depth: 1 
          persist-credentials: false

      - name: Prepare and Push Clean History
        run: |
          # 1. Setup identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Convert this checkout into a "clean slate" (no history)
          git checkout --orphan latest_release
          git add -A
          git commit -m "Automated sync: $(date +'%Y-%m-%d')"

          # 3. Add public remote and Force Push
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/barendk/iRGA-public.git
          git push public latest_release:main --force
