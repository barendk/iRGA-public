services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/goalreview
      - APP_SECRET_KEY=dev-secret-key
      # Organisation branding (optional — defaults shown)
      - ORG_NAME=${ORG_NAME:-My Organisation}
      - ORG_TAGLINE=${ORG_TAGLINE:-}
      - ORG_HEADER=${ORG_HEADER:-}
      # Set to 1 to auto-import sample_goals.tsv on first start
      - SEED_DATA=${SEED_DATA:-0}
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=goalreview
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
